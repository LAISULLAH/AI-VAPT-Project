<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="WHITENX — Vulnerability Assessment Platform" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <title>WHITENX — VAPT Scanner</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #000 !important; height: 100%; }
      body { background: #000 !important; height: 100%; margin: 0; font-family: 'JetBrains Mono','Courier New',monospace; color: #e2e8f0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
      #root { background: #000 !important; min-height: 100vh; }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
      #wx-splash { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.25s ease; }
      #wx-splash.fade { opacity: 0; pointer-events: none; }
      #wx-splash-logo { font-family: 'JetBrains Mono',monospace; font-size: 13px; font-weight: 800; letter-spacing: 6px; color: #e2e8f0; }
      #wx-splash-sub { font-size: 8px; letter-spacing: 3px; color: #1e3a5f; font-family: monospace; }
      #wx-splash-dots { display: flex; gap: 6px; }
      .wx-dot { width: 5px; height: 5px; border-radius: 50%; background: #1e3a5f; animation: wxp 1.2s ease-in-out infinite; }
      .wx-dot:nth-child(2) { animation-delay: 0.2s; }
      .wx-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes wxp { 0%,100%{background:#1e3a5f;transform:scale(0.8)} 50%{background:#38bdf8;transform:scale(1.3)} }
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to run WHITENX.</noscript>
    <div id="wx-splash">
      <div id="wx-splash-logo">⚡ WHITENX</div>
      <div id="wx-splash-sub">VAPT SCANNER</div>
      <div id="wx-splash-dots">
        <div class="wx-dot"></div>
        <div class="wx-dot"></div>
        <div class="wx-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.wxHideSplash = function() {
        var s = document.getElementById('wx-splash');
        if (!s) return;
        s.classList.add('fade');
        setTimeout(function(){ if(s&&s.parentNode) s.parentNode.removeChild(s); }, 280);
      };
    </script>
  </body>
</html>
